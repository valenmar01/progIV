<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/inscripciones.css">
    <title>Inscripciones</title>
</head>

<body>
    <header>
        <button><a href="index.html">⬅️Inicio</a></button>
        <h1>Inscripción a Cursos 📚🎒</h1>
    </header>
    <div class="seccion-busqueda">
        <h3>Buscar Estudiante/s</h3>
        <div class="fila-filtros">
            <div class="grupo-filtro">
                <label for="buscar-estudiante">Buscar por DNI</label>
                <input type="text" id="buscar-estudiante" placeholder="Ingrese término de búsqueda..." />
            </div>
            <div class="grupo-filtro">
                <label for="filtro-estado-est">Filtrar por estado</label>
                <select id="filtro-estado-est">
                    <option value="">Todos</option>
                    <option value="activo">Activos</option>
                    <option value="inactivo">Inactivos</option>
                </select>
            </div>
        </div>
        <div class="botones-accion">
            <button class="btn btn-primario">🔎 Buscar</button>
            <button class="btn btn-secundario">✕ Limpiar</button>
        </div>
    </div>
    <div class="seccion-busqueda">
        <h3>Buscar Cursos Disponibles</h3>
        <div class="fila-filtros">
            <div class="grupo-filtro">
                <label for="buscar-curso">Buscar por nombre</label>
                <input type="text" id="buscar-curso" placeholder="Ingrese término de búsqueda..." />
            </div>
            <div class="grupo-filtro">
                <label for="filtro-estado-curso">Filtrar por estado</label>
                <select id="filtro-estado-curso">
                    <option value="">Todos</option>
                    <option value="1">En Curso</option>
                    <option value="2">Completados</option>
                </select>
            </div>
        </div>
        <div class="botones-accion">
            <button class="btn btn-primario">🔎 Buscar</button>
            <button class="btn btn-secundario">✕ Limpiar</button>

        </div>
    </div>
    <button class="maga btn-primary btn" type="button"><a href="estudiantes.html">Inscribirse a cursos</a></button>
    <div class="seccion-busqueda">
        <h3>Buscar Inscripciones</h3>
        <div class="fila-filtros">
            <div class="grupo-filtro">
                <label for="buscar-inscripcion">Buscar por estudiante o curso</label>
                <input type="text" id="buscar-inscripcion" placeholder="Ingrese término de búsqueda..." />
            </div>
            <div class="grupo-filtro">
                <label for="filtro-estado-insc">Filtrar por estado</label>
                <select id="filtro-estado-insc">
                    <option value="">Todos</option>
                    <option value="1">Inscripto</option>
                    <option value="3">Completado</option>
                </select>
            </div>
        </div>
        <div class="botones-accion">
            <button class="btn btn-primario">🔎 Buscar</button>
            <button class="btn btn-secundario">✕ Limpiar</button>
        </div>
    </div>
</body>

</html>
