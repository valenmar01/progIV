<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Estudiantes</title>
</head>

<body>
  <section id="seccion-estudiantes" class="seccion activa">
    <h2>Gestión de Estudiantes</h2>
    <div class="tarjeta">
      <h3>Registrar Nuevo Estudiante</h3>
      <form id="form-agregar-estudiante" class="formulario" onsubmit="event.preventDefault();">
        <div class="grid">
          <div class="grupo-campo"><label>Nombre</label><input type="text" id="nombres"
              placeholder="Ej: Ignacio">
          </div>
          <div class="grupo-campo"><label>Apellido</label><input type="text" id="apellido"
              placeholder="Ej: Denis"></div>
          <div class="grupo-campo"><label>DNI</label><input type="text" id="documento" placeholder="Ej: 12345678">
          </div>
          <div class="grupo-campo"><label>Email</label><input type="email" id="email"
              placeholder="Ej: ignacio.id81@gmail.com"></div>
          <div class="grupo-campo"><label>Teléfono</label><input type="text" id="form-est-telefono"
              placeholder="Ej: 3454123456"></div>
        </div>
        <button type="button" class="btn-exito" onclick="">Agregar
          Estudiante</button>
      </form>
    </div>
    <div id="tabla-estudiantes" style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>DNI</th>
            <th>Email</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-estudiantes-body"></tbody>
      </table>
    </div>
  </section>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/pages/estudiantes.js"></script>
</body>


</html>
