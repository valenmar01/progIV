<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Lista de Estudiantes</title>
</head>

<header>
    <button><a href="index.html">⬅️Inicio</a></button>
    <h1>Estudiantes🧑‍🎓</h1>
</header>

<body>
    <div class="formulario-estudiantes">
        <h3>Agregar Nuevo Estudiante</h3>
        <form id="form-estudiante">
            <div class="fila-formulario">
                <div class="campo-formulario requerido">
                    <label for="est-documento">Documento (DNI)</label>
                    <input type="text" id="est-documento" placeholder="Ej: 44439620" required />
                </div>
                <div class="campo-formulario requerido">
                    <label for="est-apellido">Apellido</label>
                    <input type="text" id="est-apellido" placeholder="Ej: Denis" required />
                </div>
                <div class="campo-formulario requerido">
                    <label for="est-nombres">Nombres</label>
                    <input type="text" id="est-nombres" placeholder="Ej: Ignacio" required />
                </div>
            </div>
            <div class="fila-formulario">
                <div class="campo-formulario requerido">
                    <label for="est-email">Correo Electrónico</label>
                    <input type="email" id="est-email" placeholder="Ej: ignacio.id81@gmail.com" required />
                </div>
                <div class="campo-formulario requerido">
                    <label for="est-fecha-nac">Fecha de Nacimiento</label>
                    <input type="date" id="est-fecha-nac" required />
                </div>
            </div>
            <div class="botones-formulario">
                <button type="submit" class="btn btn-exito">✓ Agregar Estudiante</button>
                <button type="reset" class="btn btn-secundario">↻ Limpiar Formulario</button>
            </div>
        </form>
    </div>
    
    <div class="seccion-Estudiantes">
        <h2>Estudiantes registrados</h2>
        <div class="tabla-contenedor">
            <table id="tabla-alumnos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>DNI</th>
                        <th>Correo electrónico</th>
                        <th>Teléfono</th>
                        <th>Fecha de registro</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Ignacio</td>
                        <td>Denis</td>
                        <td>44.439.620</td>
                        <td>ignacio.id81@gmail.com</td>
                        <td>3454751542</td>
                        <td>30/04/2026</td>
                        <td><span class="estado estado-activo">Activo</span></td>
                        <td>
                            <button class="btn btn-editar">Editar</button>
                            <button class="btn btn-eliminar">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p class="tabla">Total de alumnos: 1</p>
    </div>
</body>

</html>
