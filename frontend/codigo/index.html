<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Inscripción - FCAD UNER</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="pantalla-app" class="contenedor" style="display: none;">
    <header>
      <div class="header-logo">
        <img src="imagenes/FCADlogo.png" alt="Logo FCAD UNER" class="logo-header">
      </div>
      <div class="header-info">
        <p>Bienvenido, <strong id="nombre-usuario">Usuario</strong></p>
        <button class="btn-peligro btn-pequeno" onclick="window.location.href='login.html'">Cerrar Sesión</button>
      </div>
    </header>
    <nav class="nav-pestanas" id="nav-principal">
      <a href="dashboard.html" target="contenedor-paginas" class="btn-pestana activo">Dashboard</a>
      <a href="estudiantes.html" target="contenedor-paginas" class="btn-pestana">Estudiantes</a>
      <a href="cursos.html" target="contenedor-paginas" class="btn-pestana">Cursos</a>
      <a href="inscripciones.html" target="contenedor-paginas" class="btn-pestana">Inscripciones</a>
    </nav>

    <main class="marco-contenido">
      <iframe name="contenedor-paginas" id="contenedor-paginas" src="dashboard.html" width="100%" height="600px"
        frameborder="0"></iframe>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>

</body>

</html>
