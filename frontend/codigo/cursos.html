<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>Cursos - FCAD UNER</title>
  </head>
  <body>
    <main class="container-fluid py-4">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <h1 class="mb-3">Cursos</h1>
          <div class="row align-items-center g-2">
            <div class="col-12 col-md-6">
              <p class="text-muted">Gestión de cursos disponibles</p>
            </div>
            <div class="col-12 col-md-6 d-flex justify-content-md-end">
              <button id="btn-agregar-curso" class="btn btn-primary">
                Agregar Curso
              </button>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-10">
          <div class="table-responsive mt-4">
            <div id="tabla-cursos">
              </div>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="modal-agregar-curso" tabindex="-1" aria-labelledby="modal-agregar-curso-label" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-agregar-curso-label">Nuevo Curso</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="text-muted mb-4">Completa los datos del curso.</p>
            <form id="form-agregar-curso" class="row g-3">
              <div class="col-12 col-md-6">
                <label for="curso-nombre" class="form-label">Nombre del Curso <span class="text-danger">*</span></label> 
                <input type="text" class="form-control" id="curso-nombre" name="nombre" required maxlength="100" />
              </div>

              <div class="col-12 col-md-6">
                <label for="curso-descripcion" class="form-label">Descripción</label>
                <input type="text" class="form-control" id="curso-descripcion" name="descripcion" maxlength="255" />
              </div>

              <div class="col-12 col-md-4">
                <label for="curso-fecha-inicio" class="form-label">Fecha de Inicio <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="curso-fecha-inicio" name="fecha_inicio" required />
              </div>

              <div class="col-12 col-md-4">
                <label for="curso-duracion" class="form-label">Horas <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="curso-duracion" name="cantidad_horas" required min="1" />
              </div>

              <div class="col-12 col-md-4">
                <label for="curso-cupo" class="form-label">Cupo Máximo <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="curso-cupo" name="inscriptos_max" required min="1" />
              </div>
              <div class="col-12 col-md-4">
                <label for="curso-estado" class="form-label">Estado</label>
                <select class="form-select" id="curso-estado" name="id_curso_estado">
                  <option value="1">Borrador</option>
                  <option value="2">Inscripción Abierta</option>
                  <option value="3">Inscripción Cerrada</option>
                  <option value="4">Eliminado</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button id="btn-submit-curso" type="submit" form="form-agregar-curso" class="btn btn-primary">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/pages/cursos.js"></script>
  </body>
</html>
