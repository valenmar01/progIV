<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>
  <section id="seccion-cursos" class="seccion activa">
    <h2>Gestión de Cursos</h2>
    <div class="tarjeta">
      <h3>Crear Nuevo Curso</h3>
      <form id="formulario-cursos" class="formulario">
        <div class="grid">
          <div class="grupo-campo"><label>Nombre del Curso</label><input type="text" id="form-cur-nombre"
              placeholder="Ej: Programación IV"></div>
          <div class="grupo-campo"><label>Descripción</label><input type="text" id="form-cur-descripcion"
              placeholder="Breve descripción"></div>
          <div class="grupo-campo"><label>Duración</label><input type="text" id="form-cur-duracion"
              placeholder="Ej: 4 meses"></div>
          <div class="grupo-campo"><label>Cupo Máximo</label><input type="number" id="form-cur-cupo"
              placeholder="Ej: 30"></div>
          <div class="grupo-campo"><label>Fecha de Inicio</label><input type="date" id="form-cur-fecha"></div>
        </div>
        <button type="button" class="btn-exito">Agregar Curso</button>
      </form>
    </div>
    <div class="contenedor-tabla">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Duración</th>
            <th>Cupo</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-cursos-body"></tbody>
      </table>
    </div>
  </section>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/pages/cursos.js"></script>
</body>

</html>
