<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Lista de Cursos</title>
</head>

<header>
    <button><a href="index.html">⬅️Inicio</a></button>
    <h2>📖 Gestión de Cursos</h2>
</header>

<body>

    <button type="button" class="btn">Cursos</button>
    <button type="button" class="btn btn-primary">Primary</button>
    <div id="cursos" class="curso">

        <div class="formulario">
            <h3>Agregar Nuevo Curso</h3>
            <form id="form-curso">
                <div class="fila-formulario">
                    <div class="campo-formulario requerido">
                        <label for="curso-nombre">Nombre del Curso</label>
                        <input type="text" id="curso-nombre" placeholder="Ej: Programacion IV" required />
                    </div>
                    <div class="campo-formulario requerido">
                        <label for="curso-fecha-inicio">Fecha de Inicio</label>
                        <input type="date" id="curso-fecha-inicio" required />
                    </div>
                </div>
                <div class="fila-formulario">
                    <div class="campo-formulario requerido">
                        <label for="curso-horas">Cantidad de Horas</label>
                        <input type="number" id="curso-horas" min="1" placeholder="Ej: 40" required />
                    </div>
                    <div class="campo-formulario requerido">
                        <label for="curso-inscriptos-max">Cupo Máximo</label>
                        <input type="number" id="curso-inscriptos-max" min="1" placeholder="Ej: 20" required />
                    </div>
                </div>
                <div class="campo-formulario requerido">
                    <label for="curso-descripcion">Descripción</label>
                    <textarea id="curso-descripcion" placeholder="Describa el contenido del curso..."
                        required></textarea>
                </div>
                <div class="botones-formulario">
                    <button type="submit" class="btn btn-exito">✓ Agregar Curso</button>
                    <button type="reset" class="btn btn-secundario">↻ Limpiar Formulario</button>
                </div>
            </form>
        </div>

        <div class="tabla-contenedor">
            <table id="tabla-cursos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Fecha Inicio</th>
                        <th>Horas</th>
                        <th>Cupo Máx.</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tbody-cursos">
                    <tr>
                        <th>1</th>
                        <th>Programacion IV</th>
                        <th>Desarrollo Web</th>
                        <th> </th>
                        <th> </th>
                        <th> </th>
                        <th> </th>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="info-tabla">
            <span>Total de cursos mostrados: <strong id="contador-cursos">0</strong></span>
        </div>

        <div class="paginacion" id="paginacion-cursos"></div>
    </div>
</body>

</html>
