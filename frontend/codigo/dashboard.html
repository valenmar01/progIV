<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>

  <body>
    <section id="seccion-dashboard" class="seccion activa">
      <h2>Visión general</h2>
      <div class="grid">
        <div class="card shadow-sm tarjeta-stat">
          <div class="card-body text-center py-3">
            <p class="text-muted small text-uppercase fw-semibold mb-1">
              Estudiantes
            </p>
            <p class="display-6 fw-bold text-dark mb-0" id="count-estudiantes">
              —
            </p>
            <a href="estudiantes.html" class="stretched-link"></a>
          </div>
        </div>

        <div class="card shadow-sm tarjeta-stat">
          <div class="card-body text-center py-3">
            <p class="text-muted small text-uppercase fw-semibold mb-1">
              Cursos
            </p>
            <p class="display-6 fw-bold text-dark mb-0" id="count-cursos">—</p>
            <a href="cursos.html" class="stretched-link"></a>
          </div>
        </div>
      </div>

      <div class="card shadow-sm mt-4">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-1">Cursos</h5>
          <div id="tabla-cursos-activos"></div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/pages/dashboard.js"></script>
  </body>
</html>
