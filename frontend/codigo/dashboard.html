<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>

  <body>
    <section id="seccion-dashboard" class="seccion activa">
      <h2>Visión general</h2>

      <div class="row g-3 mb-4">
        <div class="col">
          <div class="card shadow-sm tarjeta-stat">
            <div class="card-body text-center px-4 py-3">
              <p class="text-muted small text-uppercase fw-semibold mb-1">
                Estudiantes
              </p>
              <p
                class="display-6 fw-bold text-dark mb-0"
                id="count-estudiantes"
              >
                —
              </p>
              <a href="estudiantes.html" class="stretched-link"></a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card shadow-sm tarjeta-stat">
            <div class="card-body text-center px-4 py-3">
              <p class="text-muted small text-uppercase fw-semibold mb-1">
                Cursos
              </p>
              <p class="display-6 fw-bold text-dark mb-0" id="count-cursos">
                —
              </p>
              <a href="cursos.html" class="stretched-link"></a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card shadow-sm tarjeta-stat">
            <div class="card-body text-center px-4 py-3">
              <p class="text-muted small text-uppercase fw-semibold mb-1">
                Inscripciones
              </p>
              <p class="display-6 fw-bold text-dark mb-0" id="count-inscripciones">
                —
              </p>
              <a href="inscripciones.html" class="stretched-link"></a>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-12 col-md-4">
          <div class="card shadow-sm h-100">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-3">Distribución por estado</h5>
              <div style="max-width: 220px; margin: 0 auto">
                <canvas id="grafico-estados"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-8">
          <div class="card shadow-sm h-100">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-1">Cursos</h5>
              <div id="tabla-cursos-activos"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module" src="js/pages/dashboard.js"></script>
  </body>
</html>
