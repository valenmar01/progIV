<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <title>📊Dashboard</title>
</head>

<body>
    <div class="dashboard-container">
        <aside>
            <nav>
                <button><a href="index.html">⬅️Inicio</a></button>
            </nav>
        </aside>
        <header class="top-bar">
            <h1>Resumen del Sistema</h1>
        </header>

        <section class="stats-grid">
            <a href="cursos.html" class="card-link">
                <article class="card card-accent-blue">
                    <div class="card-icon">📚</div>
                    <div class="card-info">
                        <h3>Cursos Activos</h3>
                        <p class="stat-number" id="count-cursos">0</p>
                    </div>
                </article>
            </a>
            <a href="estudiantes.html" class="card-link">
                <article class="card card-accent-green">
                    <div class="card-icon">🧑‍🎓</div>
                    <div class="card-info">
                        <h3>Total Estudiantes</h3>
                        <p class="stat-number" id="count-estudiantes">0</p>
                    </div>
                </article>
            </a>
            <a href="inscripciones.html" class="card-link">
                <article class="card card-accent-orange">
                    <div class="card-icon">📝</div>
                    <div class="card-info">
                        <h3>Total de Inscripciones</h3>
                        <p class="stat-number" id="total-inscripciones">0</p>
                    </div>
                </article>
            </a>
            <script type="module" src="js/dashboard.js"></script>
        </section>
    </div>
</body>

</html>
