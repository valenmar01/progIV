<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Sistema de Inscripción a Cursos</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
</head>

<body>
    <div class="contenedor-dashboard">
        <h2>📊 Dashboard</h2>

        <div class="estadisticas">
            <div class="tarjeta-estadistica">
                <h4>Total de Estudiantes</h4>
                <div class="numero" id="total-estudiantes">0</div>
            </div>
            <div class="tarjeta-estadistica">
                <h4>Estudiantes Activos</h4>
                <div class="numero" id="estudiantes-activos">0</div>
            </div>
            <div class="tarjeta-estadistica">
                <h4>Total de Cursos</h4>
                <div class="numero" id="total-cursos">0</div>
            </div>
            <div class="tarjeta-estadistica">
                <h4>Total de Inscripciones</h4>
                <div class="numero" id="total-inscripciones">0</div>
            </div>
        </div>
    </div>

    <script src="/js/api/fetch.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/pages/dashboard.js"></script>

</body>

</html>
